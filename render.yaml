services:
  - type: web
    name: citation-analysis
    runtime: python
    plan: free
    buildCommand: pip install -r requirements-deploy.txt
    startCommand: uvicorn backend.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /api/health
    envVars:
      - key: PYTHON_VERSION
        value: "3.11.6"
